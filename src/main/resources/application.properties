spring.application.name=nkst-api-service

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3308/nkst_api_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useLegacyDatetimeCode=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Server Port
server.port=82

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Jwt Configuration
jwt.secret=thisIsMysecregtfrdesww233eggtffeeddgkjjhhtdhttebd54ndhdhfhhhshs8877465sb111
jwt.expiration=3600000
jwt.refreshExpiration=86400000

# Kafka
spring.kafka.bootstrap-servers=localhost:9092

# Kafka (Producer)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka (Consumer)
spring.kafka.consumer-group-id=api-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Kafka
spring.kafka.consumer.properties.spring.json.trusted.packages=com.mikkytrionze.role.application.dto

# Kafka Topics
spring.kafka.topic.user-updated=user-updated-topic
spring.kafka.topic.member-created=member-created-topic
spring.kafka.topic.church-admin-updated=church-admin-updated-topic
spring.kafka.topic.elder-created=elder-created-topic
spring.kafka.topic.deacon-created=deacon-created-topic